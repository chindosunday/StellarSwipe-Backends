global:
  resolve_timeout: 5m
  smtp_from: alerts@stellarswipe.io
  smtp_smarthost: smtp.stellarswipe.io:587
  smtp_auth_username: alerts@stellarswipe.io
  smtp_auth_password: ${SMTP_PASSWORD}

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default
  routes:
    - match:
        severity: critical
      receiver: pagerduty
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: slack
      repeat_interval: 4h

receivers:
  - name: default
    email_configs:
      - to: oncall@stellarswipe.io
        send_resolved: true

  - name: pagerduty
    pagerduty_configs:
      - service_key: ${PAGERDUTY_SERVICE_KEY}
        send_resolved: true

  - name: slack
    slack_configs:
      - api_url: ${SLACK_WEBHOOK_URL}
        channel: '#alerts'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname']
