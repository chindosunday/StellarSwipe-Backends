global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    app: stellarswipe

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: stellarswipe-backend
    static_configs:
      - targets: ['app:3000']
    metrics_path: /api/v1/metrics
    scrape_interval: 10s

  - job_name: postgresql
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']
